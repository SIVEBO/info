    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/db_ms_sucursales?createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - sivebo-net

  ms-admision:
