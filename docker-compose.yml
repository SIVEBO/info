# SIVEBO — Ecosistema completo: 10 microservicios + Eureka + Gateway + MariaDB
#
# Uso:
#   docker compose up --build        # primera vez / tras cambios de codigo
#   docker compose up -d             # arranque normal en segundo plano
#   docker compose logs -f gateway   # ver logs de un servicio puntual
#   docker compose down              # apagar todo (-v para borrar tambien la BD)

services:

  mariadb:
    image: mariadb:11
    container_name: sivebo-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ""
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sivebo-net

  eureka-server:
    build: ./eureka_server
    container_name: sivebo-eureka
    ports:
      - "8761:8761"
    environment:
      EUREKA_HOSTNAME: eureka-server
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/eureka/apps || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - sivebo-net

  gateway:
    build: ./gateway
    container_name: sivebo-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - sivebo-net

  ms-auth:
    build: ./ms_auth
    container_name: sivebo-ms-auth
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mariadb://mariadb:3306/db_ms_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ""
      EUREKA_URI: http://eureka-server:8761/eureka/
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - sivebo-net

  ms-sucursales:
    build: ./ms_sucursales
