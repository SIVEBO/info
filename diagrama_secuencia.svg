<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="740" font-family="Arial, sans-serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#374151"/></marker>
  <marker id="arr-d" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#64748b"/></marker>
</defs>
<rect width="1060" height="740" fill="#f8fafc"/>
<rect width="1060" height="48" fill="#1e40af"/>
<text x="530" y="20" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Diagrama de Secuencia — Registrar Admisión de Paquete · SIVEBO</text>
<text x="530" y="39" text-anchor="middle" fill="#93c5fd" font-size="11">Flujo: Operador registra admisión → sistema genera guía de despacho + código de tracking automáticamente</text>

<!-- ── LIFELINE BOXES ── -->
<!-- :Operador x=90 -->
<rect x="30" y="58" width="120" height="44" rx="6" fill="#1e40af" stroke="#1e40af"/>
<text x="90" y="77" text-anchor="middle" fill="white" font-size="12" font-weight="bold">:Operador</text>
<text x="90" y="93" text-anchor="middle" fill="#93c5fd" font-size="10">Polifuncional</text>

<!-- :MS·Clientes x=260 -->
<rect x="200" y="58" width="120" height="44" rx="6" fill="#065f46" stroke="#059669"/>
<text x="260" y="77" text-anchor="middle" fill="white" font-size="12" font-weight="bold">:MS·Clientes</text>
<text x="260" y="93" text-anchor="middle" fill="#a7f3d0" font-size="10">:8085</text>

<!-- :MS·Admision x=450 -->
<rect x="390" y="58" width="120" height="44" rx="6" fill="#1e40af" stroke="#3b82f6"/>
<text x="450" y="77" text-anchor="middle" fill="white" font-size="12" font-weight="bold">:MS·Admision</text>
<text x="450" y="93" text-anchor="middle" fill="#93c5fd" font-size="10">:8087</text>

<!-- :MS·Tracking x=640 -->
<rect x="580" y="58" width="120" height="44" rx="6" fill="#7c3aed" stroke="#8b5cf6"/>
<text x="640" y="77" text-anchor="middle" fill="white" font-size="12" font-weight="bold">:MS·Tracking</text>
<text x="640" y="93" text-anchor="middle" fill="#ddd6fe" font-size="10">:8093 / :8080</text>

<!-- :MS·Paquetes x=840 -->
<rect x="780" y="58" width="120" height="44" rx="6" fill="#92400e" stroke="#d97706"/>
<text x="840" y="77" text-anchor="middle" fill="white" font-size="12" font-weight="bold">:MS·Paquetes</text>
<text x="840" y="93" text-anchor="middle" fill="#fde68a" font-size="10">:8092</text>

<!-- ── LIFELINES (dashed vertical) ── -->
<line x1="90"  y1="102" x2="90"  y2="710" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="260" y1="102" x2="260" y2="710" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="450" y1="102" x2="450" y2="710" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="640" y1="102" x2="640" y2="710" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
<line x1="840" y1="102" x2="840" y2="710" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>

<!-- Activation boxes -->
<rect x="84"  y="140" width="12" height="520" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<rect x="254" y="155" width="12" height="75"  fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<rect x="444" y="220" width="12" height="440" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<rect x="254" y="270" width="12" height="50"  fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<rect x="634" y="385" width="12" height="120" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
<rect x="834" y="505" width="12" height="75"  fill="#fef3c7" stroke="#d97706" stroke-width="1"/>

<!-- ── MESSAGES ── -->

<!-- 1. Operador → MS·Clientes: buscarCliente(rut) -->
<line x1="96" y1="155" x2="252" y2="155" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="100" y="134" width="148" height="18" rx="3" fill="#f8fafc"/>
<text x="174" y="147" text-anchor="middle" font-size="10" fill="#1e293b">1: GET /clientes/buscar?rut={rut}</text>

<!-- 2. MS·Clientes → Operador: ClienteResponse -->
<line x1="254" y1="178" x2="98" y2="178" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
<text x="174" y="173" text-anchor="middle" font-size="10" fill="#64748b">2: 200 ClienteResponse</text>

<!-- 3. Operador → MS·Admision: POST /admisiones -->
<line x1="96" y1="220" x2="442" y2="220" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="98" y="199" width="242" height="18" rx="3" fill="#f8fafc"/>
<text x="218" y="212" text-anchor="middle" font-size="10" fill="#1e293b">3: POST /admisiones  (AdmisionRequest)</text>

<!-- 4. MS·Admision → MS·Clientes: verificarCliente -->
<line x1="456" y1="268" x2="266" y2="268" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="358" y="262" text-anchor="middle" font-size="10" fill="#1e293b">4: GET /clientes/{id}</text>

<!-- 5. MS·Clientes → MS·Admision: OK -->
<line x1="266" y1="292" x2="456" y2="292" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
<text x="358" y="287" text-anchor="middle" font-size="10" fill="#64748b">5: 200 OK (cliente válido)</text>

<!-- 6. MS·Admision self: save(ADMISION) -->
<path d="M 456,335 C 510,335 510,360 456,360" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="530" y="352" font-size="10" fill="#1e293b">6: save(ADMISION)</text>

<!-- 7. MS·Admision → MS·Tracking: POST /guias -->
<line x1="456" y1="393" x2="632" y2="393" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="540" y="386" text-anchor="middle" font-size="10" fill="#1e293b">7: POST /guias  (idAdmision)</text>

<!-- 8. MS·Tracking self: save(GUIA + RECIBIDO) -->
<path d="M 646,430 C 700,430 700,455 646,455" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="720" y="447" font-size="10" fill="#1e293b">8: save(GUIA_DESPACHO)</text>
<text x="720" y="460" font-size="10" fill="#1e293b">    + save(estado=RECIBIDO)</text>

<!-- 9. MS·Tracking → MS·Admision: codigoTracking -->
<line x1="634" y1="490" x2="456" y2="490" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
<text x="540" y="484" text-anchor="middle" font-size="10" fill="#64748b">9: 201 GuiaResponse (codigoTracking)</text>

<!-- 10. MS·Admision → MS·Paquetes: POST /inventario -->
<line x1="456" y1="515" x2="832" y2="515" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="640" y="508" text-anchor="middle" font-size="10" fill="#1e293b">10: POST /inventario  (idGuia, idSucursal)</text>

<!-- 11. MS·Paquetes self: save(INVENTARIO) -->
<path d="M 846,550 C 900,550 900,575 846,575" fill="none" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="908" y="567" font-size="10" fill="#1e293b">11: save(INVENTARIO_PAQUETE)</text>

<!-- 12. MS·Paquetes → MS·Admision: OK -->
<line x1="834" y1="595" x2="456" y2="595" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
<text x="640" y="589" text-anchor="middle" font-size="10" fill="#64748b">12: 201 OK</text>

<!-- 13. MS·Admision → Operador: AdmisionResponse -->
<line x1="444" y1="635" x2="98" y2="635" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
<text x="260" y="628" text-anchor="middle" font-size="10" fill="#64748b">13: 201 AdmisionResponse (codigoTracking, idAdmision)</text>

<!-- LEGEND -->
<rect x="18" y="712" width="1024" height="22" rx="3" fill="#f1f5f9" stroke="#e2e8f0"/>
<line x1="30" y1="723" x2="70" y2="723" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="78" y="727" font-size="11" fill="#1e293b">Llamada síncrona (HTTP)</text>
<line x1="230" y1="723" x2="270" y2="723" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-d)"/>
<text x="278" y="727" font-size="11" fill="#1e293b">Respuesta</text>
<rect x="400" y="716" width="12" height="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="420" y="727" font-size="11" fill="#1e293b">Caja de activación</text>
</svg>
