<svg xmlns="http://www.w3.org/2000/svg" width="580" height="920" font-family="Arial, sans-serif">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#374151"/></marker>
  <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#ef4444"/></marker>
</defs>
<rect width="580" height="920" fill="#f8fafc"/>
<rect width="580" height="48" fill="#1e40af"/>
<text x="290" y="31" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Diagrama de Actividad — Proceso de Venta POS</text>

<!-- Swim lane headers -->
<rect x="18" y="56" width="160" height="30" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
<text x="98" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Operador</text>
<rect x="178" y="56" width="200" height="30" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
<text x="278" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Sistema SIVEBO</text>
<rect x="378" y="56" width="184" height="30" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
<text x="470" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">MS·Embalaje / Finanzas</text>

<!-- Swim lane bodies -->
<rect x="18" y="86" width="160" height="810" fill="#f0f9ff" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
<rect x="178" y="86" width="200" height="810" fill="#f0fdf4" stroke="#86efac" stroke-width="1" opacity="0.4"/>
<rect x="378" y="86" width="184" height="810" fill="#fffbeb" stroke="#fcd34d" stroke-width="1" opacity="0.4"/>

<!-- START -->
<circle cx="290" cy="118" r="14" fill="#1e293b"/>
<line x1="290" y1="132" x2="290" y2="152" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- A1: Seleccionar artículo -->
<rect x="180" y="152" width="220" height="40" rx="20" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="290" y="177" text-anchor="middle" font-size="11" fill="#1e293b">Seleccionar artículo de embalaje</text>
<line x1="290" y1="192" x2="290" y2="212" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- A2: Verificar stock -->
<rect x="390" y="212" width="165" height="40" rx="20" fill="white" stroke="#d97706" stroke-width="1.5"/>
<text x="472" y="237" text-anchor="middle" font-size="11" fill="#1e293b">Verificar stock en sucursal</text>
<line x1="290" y1="192" x2="470" y2="212" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="472" y1="252" x2="472" y2="272" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- D1: ¿Stock disponible? -->
<polygon points="472,272 522,302 472,332 422,302" fill="#fdf4ff" stroke="#9333ea" stroke-width="1.5"/>
<text x="472" y="298" text-anchor="middle" font-size="10" fill="#6b21a8">¿Stock</text>
<text x="472" y="312" text-anchor="middle" font-size="10" fill="#6b21a8">disponible?</text>

<!-- No branch → Notificar -->
<line x1="472" y1="332" x2="472" y2="360" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
<text x="485" y="350" font-size="10" fill="#ef4444">No</text>
<rect x="392" y="360" width="165" height="40" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
<text x="474" y="385" text-anchor="middle" font-size="11" fill="#7f1d1d">Notificar stock insuficiente</text>
<!-- End of No branch (small end node) -->
<line x1="472" y1="400" x2="472" y2="425" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
<circle cx="472" cy="440" r="12" fill="none" stroke="#ef4444" stroke-width="1.5"/>
<circle cx="472" cy="440" r="7" fill="#ef4444"/>
<text x="472" y="462" text-anchor="middle" font-size="10" fill="#ef4444">Fin (sin venta)</text>

<!-- Sí branch down -->
<line x1="422" y1="302" x2="290" y2="302" stroke="#374151" stroke-width="1.5"/>
<line x1="290" y1="302" x2="290" y2="352" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="355" y="295" text-anchor="middle" font-size="10" fill="#059669">Sí</text>

<!-- A3: Agregar línea a boleta -->
<rect x="180" y="352" width="220" height="40" rx="20" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="290" y="377" text-anchor="middle" font-size="11" fill="#1e293b">Agregar línea a boleta</text>
<line x1="290" y1="392" x2="290" y2="412" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- D2: ¿Más artículos? -->
<polygon points="290,412 340,442 290,472 240,442" fill="#fdf4ff" stroke="#9333ea" stroke-width="1.5"/>
<text x="290" y="438" text-anchor="middle" font-size="10" fill="#6b21a8">¿Agregar</text>
<text x="290" y="452" text-anchor="middle" font-size="10" fill="#6b21a8">más?</text>

<!-- Sí: loop back -->
<line x1="240" y1="442" x2="80" y2="442" stroke="#374151" stroke-width="1.5"/>
<line x1="80" y1="442" x2="80" y2="172" stroke="#374151" stroke-width="1.5"/>
<line x1="80" y1="172" x2="178" y2="172" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="145" y="435" text-anchor="middle" font-size="10" fill="#374151">Sí</text>

<!-- No: down -->
<line x1="290" y1="472" x2="290" y2="500" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="310" y="492" font-size="10" fill="#374151">No</text>

<!-- A4: Calcular total -->
<rect x="180" y="500" width="220" height="40" rx="20" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="290" y="525" text-anchor="middle" font-size="11" fill="#1e293b">Calcular subtotal + IVA (19%) + total</text>
<line x1="290" y1="540" x2="290" y2="560" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- A5: Confirmar venta -->
<rect x="180" y="560" width="220" height="40" rx="20" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="290" y="578" text-anchor="middle" font-size="11" fill="#1e293b">Confirmar venta</text>
<text x="290" y="593" text-anchor="middle" font-size="11" fill="#1e293b">Generar nro. de boleta único</text>
<line x1="290" y1="600" x2="290" y2="620" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Fork bar -->
<rect x="200" y="620" width="180" height="6" rx="3" fill="#1e293b"/>
<line x1="240" y1="626" x2="110" y2="660" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="330" y1="626" x2="460" y2="660" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- A6: Descontar stock (left) -->
<rect x="30" y="660" width="175" height="40" rx="20" fill="white" stroke="#d97706" stroke-width="1.5"/>
<text x="117" y="678" text-anchor="middle" font-size="11" fill="#1e293b">Descontar stock</text>
<text x="117" y="693" text-anchor="middle" font-size="11" fill="#1e293b">MS·Embalaje</text>

<!-- A7: Registrar movimiento caja (right) -->
<rect x="375" y="660" width="175" height="40" rx="20" fill="white" stroke="#d97706" stroke-width="1.5"/>
<text x="462" y="678" text-anchor="middle" font-size="11" fill="#1e293b">Registrar movimiento</text>
<text x="462" y="693" text-anchor="middle" font-size="11" fill="#1e293b">en caja · MS·Finanzas</text>

<!-- Join bar -->
<line x1="117" y1="700" x2="117" y2="730" stroke="#374151" stroke-width="1.5"/>
<line x1="462" y1="700" x2="462" y2="730" stroke="#374151" stroke-width="1.5"/>
<rect x="117" y="730" width="345" height="6" rx="3" fill="#1e293b"/>
<line x1="290" y1="736" x2="290" y2="756" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- A8: Emitir boleta -->
<rect x="180" y="756" width="220" height="40" rx="20" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
<text x="290" y="781" text-anchor="middle" font-size="11" fill="#1e293b">Emitir boleta al cliente</text>
<line x1="290" y1="796" x2="290" y2="820" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- END -->
<circle cx="290" cy="845" r="14" fill="none" stroke="#1e293b" stroke-width="2"/>
<circle cx="290" cy="845" r="8" fill="#1e293b"/>
</svg>
